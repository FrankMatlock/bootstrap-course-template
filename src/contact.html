<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>
  <div class="container py-5">
    <h1>Contact Us</h1>
    <form id="contactForm" class="mt-4">
      <input class="form-control mb-3" type="text" placeholder="Name" required>
      <input class="form-control mb-3" type="email" placeholder="Email" required>
      <textarea class="form-control mb-3" placeholder="Message" required></textarea>
      <button class="btn btn-primary">Send</button>
    </form>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
